networks:
  bigdata_net:
    driver: bridge

services:
  # ==========================================
  # NÚCLEO HADOOP (HDFS + YARN)
  # ==========================================
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-namenode
    networks:
      - bigdata_net
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=cluster_curso_iabd
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
    
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-datanode
    networks:
      - bigdata_net
    depends_on:
      - namenode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
      
  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-resourcemanager
    networks:
      - bigdata_net
    depends_on:
      - namenode
      - datanode
    ports:
      - "8088:8088"
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000

  # ==========================================
  # ECOSISTEMA SPARK Y PYTHON
  # ==========================================
  spark-master:
    image: bde2020/spark-master:3.1.1-hadoop3.2
    container_name: spark-master
    networks:
      - bigdata_net
    ports:
      - "8080:8080"
      - "7077:7077"

  spark-worker:
    image: bde2020/spark-worker:3.1.1-hadoop3.2
    container_name: spark-worker
    networks:
      - bigdata_net
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.1.1
    container_name: jupyter-python
    networks:
      - bigdata_net
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes

  # ==========================================
  # ARTILLERÍA PESADA: HIVE Y PRESTO
  # ==========================================
  hive-metastore-db:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: hive-metastore-db
    networks:
      - bigdata_net
    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hive
      - POSTGRES_DB=metastore

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    command: /opt/hive/bin/hive --service metastore
    depends_on:
      - namenode
      - datanode
      - hive-metastore-db
    networks:
      - bigdata_net
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "9083:9083"

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    depends_on:
      - hive-metastore
    networks:
      - bigdata_net
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionURL=jdbc:postgresql://hive-metastore-db/metastore
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName=org.postgresql.Driver
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName=hive
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword=hive
    ports:
      - "10000:10000" # Puerto JDBC de Hive

  presto-coordinator:
    image: prestodb/presto:latest
    container_name: presto-coordinator
    depends_on:
      - hive-metastore
    networks:
      - bigdata_net
    ports:
      - "8089:8080" # Interfaz web de Presto